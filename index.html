<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra Singco | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 0.5rem; }
        .highlight { color: var(--accent-color); }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        section { margin-bottom: 6rem; }
        h2 { border-left: 4px solid var(--accent-color); padding-left: 1rem; margin-bottom: 2.5rem; }

        /* Logo Gallery Styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover { transform: scale(1.02); border-color: var(--accent-color); }

        .gallery-img {
            width: 100%;
            height: 200px;
            background: #2d3e50; /* Placeholder color */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-weight: bold;
        }

        .gallery-desc { padding: 1rem; text-align: center; font-size: 0.9rem; }

        /* Contact Form Styles */
        .contact-form {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group { margin-bottom: 1.5rem; }
        
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--input-bg);
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.9; }

        footer { text-align: center; padding: 4rem; color: var(--text-dim); border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

    <header>
        <h1>Hi, I'm <span class="highlight">Piedra Singco</span></h1>
        <p style="font-size: 1.4rem; color: var(--text-dim);">Digital Artist & Web Developer</p>
        <br>
        <a href="#work" class="btn">Explore Portfolio</a>
    </header>

    <div class="container">
        
        <section id="work">
            <h2>Design Showcase</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <div class="gallery-img">TRAVELO</div>
                    <div class="gallery-desc">Modern Travel Identity</div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-img">CARITON</div>
                    <div class="gallery-desc">Logistics & Branding</div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-img">MAC BEAUTY</div>
                    <div class="gallery-desc">Digital Marketing Assets</div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-img">ALLWOOD</div>
                    <div class="gallery-desc">Carpentry & Craft Brand</div>
                </div>
            </div>
        </section>

        <section id="contact">
            <h2>Let's Collaborate</h2>
            <div class="contact-form">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Project Details</label>
                        <textarea rows="5" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 Piedra Singco. Shifting perspectives through design.</p>
    </footer>

</body>
</html>
